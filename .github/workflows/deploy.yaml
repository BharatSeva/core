name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          command_timeout: 25m
          script: |
            set -e
            BASE_DIR="/home/${{ secrets.USERNAME }}/core"

            # ─── Stop existing services ───────────────────────────
            if [ -d "$BASE_DIR/.git" ]; then
              echo ">>> Stopping existing services..."
              cd "$BASE_DIR"
              docker compose down || true
            fi

            # ─── Fresh clone every time ───────────────────────────
            rm -rf "$BASE_DIR"
            git clone --recurse-submodules https://github.com/BharatSeva/core.git "$BASE_DIR"
            cd "$BASE_DIR"

            # ─── Write .env files ─────────────────────────────────
            cat > "$BASE_DIR/Client-Interface/.env.production" <<EOL
            REACT_APP_CLIENT_API_URL=http://${{ secrets.HOST }}/api/v1/user
            EOL

            cat > "$BASE_DIR/healthcare-interface/.env.production" <<EOL
            REACT_APP_HEALTHCARE_API_URL=http://${{ secrets.HOST }}/api/v1/healthcare
            EOL

            # ─── Deploy ───────────────────────────────────────────
            make init

            echo ">>> Deployment complete. Service status:"
            make status