name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          command_timeout: 25m
          script: |
            set -e
            BASE_DIR="/home/${{ secrets.USERNAME }}/core"

            # ─── First Time Setup ─────────────────────────────────
            if [ ! -d "$BASE_DIR/.git" ]; then
              echo ">>> Fresh install — cloning repo with submodules..."
              git clone --recurse-submodules https://github.com/BharatSeva/core.git "$BASE_DIR"
              cd "$BASE_DIR"
              make init
              make status
              exit 0
            fi

            # ─── Existing Install — Pull Latest Changes ───────────
            echo ">>> Existing install found — pulling latest changes..."
            cd "$BASE_DIR"

            # Pull main repo changes
            git fetch origin main
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)

            if [ "$LOCAL" = "$REMOTE" ]; then
              echo ">>> Main repo is up to date. Checking submodules..."
            else
              echo ">>> Main repo has changes — pulling..."
              git pull origin main
            fi

            # ─── Pull Submodule Changes ───────────────────────────
            echo ">>> Checking submodules for changes..."
            SUBMODULE_CHANGED=false

            git submodule update --init --recursive --remote

            # Check if any submodule actually changed
            if ! git diff --quiet HEAD; then
              echo ">>> Submodule changes detected!"
              git submodule foreach '
                LOCAL=$(git rev-parse HEAD)
                REMOTE=$(git rev-parse @{u} 2>/dev/null || echo "")
                if [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ]; then
                  echo "  → $name has new commits"
                fi
              '
              SUBMODULE_CHANGED=true
            else
              echo ">>> No submodule changes."
            fi

            # ─── Rebuild Only What Changed ────────────────────────
            MAIN_CHANGED=false
            if [ "$LOCAL" != "$REMOTE" ]; then
              MAIN_CHANGED=true
            fi

            if [ "$MAIN_CHANGED" = true ] || [ "$SUBMODULE_CHANGED" = true ]; then
              echo ">>> Changes detected — restarting services..."
              make stop || true
              make start

              # Rebuild frontend only if those submodules changed
              if git diff --name-only HEAD@{1} HEAD | grep -q "Client-Interface\|healthcare-interface"; then
                echo ">>> Frontend submodules changed — rebuilding..."
                make rebuild
                make reload-nginx
              fi
            else
              echo ">>> No changes detected. Nothing to redeploy."
            fi

            # ─── Final Status ─────────────────────────────────────
            echo ">>> Deployment complete. Service status:"
            make status